run:
  dir: outputs/stage1_index_dataset

dataset:
  root: data
  data_name: vietnamese_dataset

defaults:
  - ner_model: openai_gpt4o_mini
  - openie_model: openai_gpt4o_mini
  - el_model: multilingual_dpr

ner_model:
  _target_: gfmrag.kg_construction.ner_model.LLMNERModel
  llm_api: openai
  model_name: gpt-4o-mini
  max_tokens: 1024

openie_model:
  _target_: gfmrag.kg_construction.openie_model.LLMOPENIEModel
  llm_api: openai
  model_name: gpt-4o-mini
  max_ner_tokens: 1024
  max_triples_tokens: 4096

el_model:
  _target_: gfmrag.kg_construction.entity_linking_model.DPRELModel
  model_name: intfloat/multilingual-e5-base
  root: tmp
  use_cache: true
  normalize: true
  batch_size: 32

kg_constructor:
  _target_: gfmrag.kg_construction.KGConstructor
  root: tmp/kg_construction
  num_processes: 4
  cosine_sim_edges: true
  threshold: 0.8
  max_sim_neighbors: 100
  add_title: true
  force: false
  open_ie_model: ${openie_model}
  ner_model: ${ner_model}
  el_model: ${el_model}

qa_constructor:
  _target_: gfmrag.kg_construction.QAConstructor
  root: tmp/qa_construction
  num_processes: 4
  force: false
  ner_model: ${ner_model}
  el_model: ${el_model}