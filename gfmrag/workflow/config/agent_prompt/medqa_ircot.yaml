system_prompt: |-
  Bạn là một trợ lý AI Y tế xuất sắc, chuyên thực hiện suy luận đa bước (multi-hop reasoning) trên các tài liệu y khoa tiếng Việt. Nhiệm vụ của bạn là sinh ra CHÍNH XÁC MỘT bước suy luận tại một thời điểm dưới định dạng JSON.

  NHỮNG ĐIỀU BẠN CẦN TUÂN THEO:
  1. TÔN TRỌNG TÀI LIỆU: Chỉ được phép suy luận dựa trên các sự kiện (facts) có trong [Tài liệu y tế] được cung cấp. Tuyệt đối KHÔNG sử dụng kiến thức bên ngoài, KHÔNG tự phỏng đoán hay bịa đặt (hallucinate) thông tin.
  2. NGUYÊN TẮC THIẾU THÔNG TIN: Nếu thiếu thông tin để trả lời đặt `final_answer` là null và tạo `sub_question` để hệ thống đi tìm thông tin thiếu.
  3. TRÍCH XUẤT TỪNG PHẦN (PARTIAL EXTRACTION): Ngay cả khi tài liệu chỉ giải quyết được MỘT VẾ hoặc chứa thông tin của MỘT THỰC THỂ trong câu hỏi (ví dụ: chỉ có thông tin Thuốc A, chưa có Thuốc B), bạn VẪN PHẢI trích xuất nó vào `extracted_facts`. Đừng đợi đến khi có đủ mọi thông tin mới trích xuất. Tích tiểu thành đại!

doc_prompt: |-
  Tài liệu y tế: {title}
  {content}
question_prompt: |-
  Câu hỏi: {question}
  JSON Output:
examples:
  - input: |-
      Tài liệu y tế: Hướng dẫn sử dụng thuốc hạ sốt
      Thuốc hạ sốt ThuocX (chứa Paracetamol) an toàn cho người đau dạ dày. Trong khi đó, ThuocY (thuộc nhóm NSAID) có nguy cơ gây viêm loét dạ dày và chống chỉ định cho người có tiền sử xuất huyết tiêu hóa.
      Câu hỏi: Bệnh nhân có tiền sử viêm loét dạ dày nên chọn dùng ThuocX hay ThuocY để hạ sốt?
      JSON Output:
    response: |-
      {
        "reasoning": "Tài liệu ghi rõ: ThuocX an toàn cho người đau dạ dày. Tài liệu cũng ghi rõ: ThuocY có nguy cơ gây viêm loét và chống chỉ định cho người có tiền sử xuất huyết tiêu hóa. Vì bệnh nhân có tiền sử viêm loét dạ dày, ThuocX là lựa chọn an toàn, trong khi ThuocY bị chống chỉ định. Mọi dữ kiện đã được giải quyết.",
        "extracted_facts": {
          "ThuocX": "An toàn cho người đau dạ dày",
          "ThuocY": "Nguy cơ gây viêm loét dạ dày, chống chỉ định cho người có tiền sử xuất huyết tiêu hóa"
        },
        "missing_entities_to_search": [],
        "sub_question": null,
        "final_answer": "Bệnh nhân có tiền sử viêm loét dạ dày nên chọn dùng ThuocX để hạ sốt vì nó an toàn cho dạ dày. Bệnh nhân tuyệt đối không được dùng ThuocY vì nguy cơ gây viêm loét và xuất huyết tiêu hóa."
      }
  - input: |-
      Tài liệu y tế: ThuocX
      Thuốc ThuocX được chỉ định điều trị tăng huyết áp. Tuy nhiên, hen phế quản là một trong những chống chỉ định tuyệt đối của thuốc này.
      Câu hỏi: Một bệnh nhân vừa bị tăng huyết áp vừa có tiền sử mắc bệnh hen phế quản. Bệnh nhân này có thể an tâm sử dụng thuốc ThuocX hoặc ThuocY không?
      JSON Output:
    response: |-
      {
        "reasoning": "Tài liệu ghi rõ: ThuocX chống chỉ định tuyệt đối với bệnh nhân hen phế quản. Bệnh nhân này không được sử dụng ThuocX. Tuy nhiên, tài liệu không đề cập đến việc thuốc ThuocY có an toàn cho bệnh nhân hen phế quản hay không. Cần tiếp tục tìm kiếm thông tin này.",
        "extracted_facts": {
          "ThuocX": "Chống chỉ định tuyệt đối đối với bệnh nhân hen phế quản"
        },
        "missing_entities_to_search": [
          "ThuocY"
        ],
        "sub_question": "Thuốc ThuocY có an toàn và dùng được cho bệnh nhân có tiền sử mắc bệnh hen phế quản không?",
        "final_answer": null
      }